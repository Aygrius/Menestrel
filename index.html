<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>💀</text></svg>">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menestrel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" rel="stylesheet">

  <style>
    body {
      background: #06060a;
      margin: 0;
    }

    #__loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06060a;
      z-index: 9999;
      transition: opacity .3s;
    }

    #__loading.gone {
      opacity: 0;
      pointer-events: none;
    }

    #__loading .flame {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgb(150, 0, 0);
      display: grid;
      place-items: center;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: .9;
      }

      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }
  </style>
</head>

<body data-mode="grimoire">

  <div id="__loading">
    <div class="skull">
      <svg viewBox="0 0 24 24" width="40" height="40" fill="#06060a">
        <path d="M12 3 c-2 4 -5 6 -5 10 a5 5 0 1 0 10 0 c0 -4 -3 -6 -5 -10 z" />
      </svg>
    </div>
  </div>

  <div class="page-edge"></div>
  <div class="page-edge right"></div>
  <div id="root"></div>

  <!-- Tira o loading screen quando o React monta -->
  <script>
    const obs = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        document.getElementById('__loading')?.classList.add('gone');
        setTimeout(() => document.getElementById('__loading')?.remove(), 400);
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'), { childList: true });
  </script>

  <!-- Entry do Vite. Substitui as libs de CDN, o Babel e todos os <script> de fase. -->
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
